<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader — MP3 & MP4</title>
  <meta name="description" content="Téléchargeur YouTube personnel — MP3 et MP4 haute qualité">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">
            <img src="img/youtube-downloader.ico" alt="Logo">
          </div>
          <h1>YT <span class="accent">Downloader</span></h1>
        </div>
        <div class="header-actions">
          <button id="theme-btn" title="Changer de thème">
            <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button id="settings-btn" title="Paramètres">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </div>
      <p class="subtitle">Télécharge tes vidéos YouTube, YouTube Music — MP4, MP3 ou WAV</p>
    </header>

    <!-- Navigation -->
    <nav class="nav-bar">
      <a href="index.html" class="nav-link active">YouTube</a>
      <a href="tiktok.html" class="nav-link">TikTok</a>
      <a href="spotify.html" class="nav-link nav-spotify">Spotify</a>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Paramètres</h2>
        <div class="form-group">
          <label>Dossier d'enregistrement :</label>
          <div class="input-with-button">
            <input type="text" id="download-dir-input" placeholder="Ex: C:\Users\Nom\Downloads" />
            <button id="browse-btn" class="browse-btn" title="Parcourir les dossiers">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="settings-cancel" class="btn">Annuler</button>
          <button id="settings-save" class="btn btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-card glass">
        <div class="input-group">
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input
              type="url"
              id="url-input"
              placeholder="Colle un lien YouTube ou YouTube Music ici..."
              autocomplete="off"
              spellcheck="false"
            />
            <button id="paste-btn" class="paste-btn" title="Coller depuis le presse-papier">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
          <button id="fetch-btn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <span>Rechercher</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Récupération des infos...</p>
    </div>

    <!-- Error -->
    <div id="error" class="error-card glass hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p id="error-message"></p>
    </div>

    <!-- Single Video Result -->
    <section id="result" class="result-section hidden">
      <div class="video-card glass">
        <div class="video-preview">
          <img id="thumbnail" src="" alt="Thumbnail" />
          <div class="duration-badge" id="duration"></div>
        </div>
        <div class="video-info">
          <h2 id="video-title" class="video-title"></h2>
          <p id="video-channel" class="video-channel"></p>
          <div class="video-stats">
            <span id="video-views" class="stat"></span>
          </div>
        </div>
      </div>

      <!-- Download Options -->
      <div class="download-options glass">
        <h3 class="options-title">Options de téléchargement</h3>

        <!-- Format Toggle -->
        <div class="format-toggle three-cols">
          <button id="btn-mp4" class="format-btn active" data-format="mp4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
              <line x1="7" y1="2" x2="7" y2="22"/>
              <line x1="17" y1="2" x2="17" y2="22"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <line x1="2" y1="7" x2="7" y2="7"/>
              <line x1="2" y1="17" x2="7" y2="17"/>
              <line x1="17" y1="7" x2="22" y2="7"/>
              <line x1="17" y1="17" x2="22" y2="17"/>
            </svg>
            <span>MP4</span>
            <small>Vidéo</small>
          </button>
          <button id="btn-mp3" class="format-btn" data-format="mp3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            <span>MP3</span>
            <small>Audio</small>
          </button>
          <button id="btn-wav" class="format-btn" data-format="wav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="2 12 5 6 8 16 11 8 14 14 17 10 20 12 22 12"/>
            </svg>
            <span>WAV</span>
            <small>Sans perte</small>
          </button>
        </div>

        <!-- Quality Selector -->
        <div class="quality-section">
          <label class="quality-label">Qualité</label>
          <div class="quality-grid" id="quality-grid"></div>
        </div>

        <!-- Download Button -->
        <button id="download-btn" class="btn btn-download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Télécharger</span>
        </button>

        <!-- Download Progress -->
        <div id="download-progress" class="download-progress hidden">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">Préparation du téléchargement...</p>
        </div>
      </div>
    </section>

    <!-- Playlist Result -->
    <section id="playlist-result" class="result-section hidden">
      <div class="playlist-header glass">
        <div class="playlist-header-content">
          <div class="playlist-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <span>Playlist</span>
          </div>
          <h2 id="playlist-title" class="playlist-title"></h2>
          <p id="playlist-count" class="playlist-count"></p>
        </div>

        <!-- Playlist Format & Quality -->
        <div class="playlist-options">
          <div class="format-toggle three-cols">
            <button id="pl-btn-mp4" class="format-btn active" data-format="mp4">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                <line x1="7" y1="2" x2="7" y2="22"/>
                <line x1="17" y1="2" x2="17" y2="22"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
              </svg>
              <span>MP4</span>
              <small>Vidéo</small>
            </button>
            <button id="pl-btn-mp3" class="format-btn" data-format="mp3">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <span>MP3</span>
              <small>Audio</small>
            </button>
            <button id="pl-btn-wav" class="format-btn" data-format="wav">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="2 12 5 6 8 16 11 8 14 14 17 10 20 12 22 12"/>
              </svg>
              <span>WAV</span>
              <small>Sans perte</small>
            </button>
          </div>

          <div class="quality-section">
            <label class="quality-label">Qualité</label>
            <div class="quality-grid" id="pl-quality-grid"></div>
          </div>

          <button id="download-all-btn" class="btn btn-download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Tout télécharger</span>
          </button>
        </div>
      </div>

      <!-- Playlist Videos List -->
      <div id="playlist-videos" class="playlist-videos">
        <!-- Filled dynamically -->
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
