<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Downloader — MP3 & MP4</title>
  <meta name="description" content="Téléchargeur TikTok personnel — MP3 et MP4 haute qualité sans filigrane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal.hidden { display: none; }
    .modal-content { padding: 30px; width: 450px; max-width: 90%; border-radius: 12px; }
  </style>
</head>
<body>
  <!-- Animated background -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-top" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <h1>TikTok <span class="accent">Downloader</span></h1>
        </div>
        <button id="settings-btn" class="btn" style="padding: 10px; border-radius: 50%; background: rgba(255,255,255,0.1);" title="Paramètres">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
      <p class="subtitle">Télécharge tes vidéos TikTok en MP3 ou MP4</p>
    </header>

    <!-- Navigation -->
    <nav class="nav-bar">
      <a href="index.html" class="nav-link">YouTube</a>
      <a href="tiktok.html" class="nav-link active">TikTok</a>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content glass">
        <h2 style="margin-bottom: 15px; font-size: 1.5rem;">Paramètres</h2>
        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.9rem; color: #a1a1aa;">Dossier d'enregistrement des vidéos :</label>
          <input type="text" id="download-dir-input" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-size: 0.95rem; outline: none;" placeholder="Ex: C:\Users\Nom\Downloads" />
        </div>
        <div class="modal-actions" style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 12px;">
          <button id="settings-cancel" class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">Annuler</button>
          <button id="settings-save" class="btn btn-primary" style="padding: 10px 20px;">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-card glass">
        <div class="input-group">
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <input
              type="url"
              id="url-input"
              placeholder="Colle un lien TikTok ici..."
              autocomplete="off"
              spellcheck="false"
            />
            <button id="paste-btn" class="paste-btn" title="Coller depuis le presse-papier">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
          <button id="fetch-btn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <span>Rechercher</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Récupération des infos...</p>
    </div>

    <!-- Error -->
    <div id="error" class="error-card glass hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p id="error-message"></p>
    </div>

    <!-- Single Video Result -->
    <section id="result" class="result-section hidden">
      <div class="video-card glass">
        <div class="video-preview">
          <img id="thumbnail" src="" alt="Thumbnail" />
          <div class="duration-badge" id="duration"></div>
        </div>
        <div class="video-info">
          <h2 id="video-title" class="video-title"></h2>
          <p id="video-channel" class="video-channel"></p>
          <div class="video-stats">
            <span id="video-views" class="stat"></span>
          </div>
        </div>
      </div>

      <!-- Download Options -->
      <div class="download-options glass">
        <h3 class="options-title">Options de téléchargement</h3>

        <!-- Format Toggle -->
        <div class="format-toggle">
          <button id="btn-mp4" class="format-btn active" data-format="mp4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
              <line x1="7" y1="2" x2="7" y2="22"/>
              <line x1="17" y1="2" x2="17" y2="22"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <line x1="2" y1="7" x2="7" y2="7"/>
              <line x1="2" y1="17" x2="7" y2="17"/>
              <line x1="17" y1="7" x2="22" y2="7"/>
              <line x1="17" y1="17" x2="22" y2="17"/>
            </svg>
            <span>MP4</span>
            <small>Vidéo</small>
          </button>
          <button id="btn-mp3" class="format-btn" data-format="mp3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            <span>MP3</span>
            <small>Audio</small>
          </button>
        </div>

        <!-- Quality Selector -->
        <div class="quality-section">
          <label class="quality-label">Qualité</label>
          <div class="quality-grid" id="quality-grid"></div>
        </div>

        <!-- Download Button -->
        <button id="download-btn" class="btn btn-download">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Télécharger</span>
        </button>

        <!-- Download Progress -->
        <div id="download-progress" class="download-progress hidden">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">Préparation du téléchargement...</p>
        </div>
      </div>
    </section>

    <!-- Playlist Result -->
    <section id="playlist-result" class="result-section hidden">
      <div class="playlist-header glass">
        <div class="playlist-header-content">
          <div class="playlist-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <span>Playlist</span>
          </div>
          <h2 id="playlist-title" class="playlist-title"></h2>
          <p id="playlist-count" class="playlist-count"></p>
        </div>

        <!-- Playlist Format & Quality -->
        <div class="playlist-options">
          <div class="format-toggle">
            <button id="pl-btn-mp4" class="format-btn active" data-format="mp4">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
                <line x1="7" y1="2" x2="7" y2="22"/>
                <line x1="17" y1="2" x2="17" y2="22"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
              </svg>
              <span>MP4</span>
              <small>Vidéo</small>
            </button>
            <button id="pl-btn-mp3" class="format-btn" data-format="mp3">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <span>MP3</span>
              <small>Audio</small>
            </button>
          </div>

          <div class="quality-section">
            <label class="quality-label">Qualité</label>
            <div class="quality-grid" id="pl-quality-grid"></div>
          </div>

          <button id="download-all-btn" class="btn btn-download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Tout télécharger</span>
          </button>
        </div>
      </div>

      <!-- Playlist Videos List -->
      <div id="playlist-videos" class="playlist-videos">
        <!-- Filled dynamically -->
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
